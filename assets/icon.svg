  <path d="M 164 16 L 164 48 Q 164 56 172 56 L 204 56" fill="url(#fold)" stroke="#3b4252" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"></path>
  <path d="M 164 16 L 204 56" stroke="#3b4252" stroke-width="6" stroke-linecap="round" fill="none"></path>

  
