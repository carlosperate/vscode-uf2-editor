<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"></stop>
      <stop offset="1" stop-color="#e9ecf3"></stop>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c7cdda"></stop>
      <stop offset="1" stop-color="#9aa3b6"></stop>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2740"></stop>
      <stop offset="1" stop-color="#1a1828"></stop>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4d9e3"></stop>
      <stop offset="1" stop-color="#9aa3b6"></stop>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cff"></stop>
      <stop offset="1" stop-color="#6d3df0"></stop>
    </linearGradient>
    <filter id="bandShadow" x="-10%" y="-50%" width="120%" height="200%">
