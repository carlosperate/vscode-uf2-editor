      <feOffset dx="0" dy="3" result="o"></feOffset>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"></feFuncA></feComponentTransfer>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <clipPath id="paperClip">
