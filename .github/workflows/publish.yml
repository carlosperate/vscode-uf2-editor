name: Publish Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package only, do not publish"
        type: boolean
        default: false

jobs:
  publish:
    name: Publish Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: "npm"

      - run: npm ci

      - name: Verify package.json version matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VERSION"
          echo "release tag : $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi

      - run: npm run build:extension

      - run: npm run lint

      - run: xvfb-run -a npm run test:extension

      - name: Package VSIX
        run: |
          VSIX_NAME="uf2editor-${GITHUB_REF_NAME:-v$(node -p "require('./package.json').version")}.vsix"
          npx --yes @vscode/vsce package --out "$VSIX_NAME"
          echo "VSIX_NAME=$VSIX_NAME" >> "$GITHUB_ENV"

      - name: Upload VSIX to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "$VSIX_NAME" --clobber

      - name: Publish to VS Code Marketplace
        if: github.event_name == 'release' || inputs.dry_run == false
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath "$VSIX_NAME"

      - name: Publish to Open VSX Registry
        if: github.event_name == 'release' || inputs.dry_run == false
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish dist/*.vsix
